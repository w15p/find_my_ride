# Ford Escort Mk1 LHD Monitor — Configuration
# Copy this file to config/config.yaml and fill in your credentials.
# Sensitive values can also be set as environment variables (see .env.example).

# ─── Search filters ───────────────────────────────────────────────────────────
filters:
  model_keywords:
    - escort
    - "escort mk1"
    - "escort mkI"
    - "escort mk 1"
  year_from: 1968
  # 1975 and later trigger US California emissions rules, which makes resale
  # / import there fiddly. Cap at 1974 across every search where it applies.
  year_to: 1974
  steering: lhd
  # Hard price window in USD. Anything outside is rejected at save time and
  # never reaches the DB or the email.
  #   - Below the floor: almost always a part, an outlier "free for parts" car,
  #     or a 1:18 scale model. $2K leaves headroom for the rare bargain.
  #   - Above the ceiling: out of personal budget. Don't waste DB rows on it.
  min_price_usd: 2000
  max_price_usd: 35000
  # FB Marketplace listings rarely include the car's year in card metadata,
  # so listings.year=None on many FB items. For the cars hunt, require at
  # least one Mk-version signal in the title when year is unknown - keeps
  # scale models, unmarked Mk2+, and generic "Escort" parts out of the DB.
  # Alfa/other searches don't set this and get permissive unknown-year
  # handling (reviewed manually).
  no_year_signals: [mk1, "mk 1", mki, "mk i", "mark 1", "mark i"]
  # Perceptual-hash Hamming distance threshold for cross-source dedupe.
  phash_max_distance: 8
  # Title tokens that conclusively identify a non-Mk1-car listing (parts, wrong variants,
  # scale models). Single tokens are matched at word boundaries; multi-word phrases
  # (e.g. "motor de") match as substrings of the ASCII-folded title.
  reject_title_keywords:
    # Variants — Mk2 through Mk5 in every spelling I've seen in titles.
    # "mark i" is deliberately NOT in this list because Mk1 listings are
    # legitimately titled "Mark I" / "Mark 1"; only the higher marks reject.
    - mk2
    - "mk 2"
    - "mk ii"      # Roman: "Ford Escort MK II" slipped through (had only "mark ii")
    - "mark 2"
    - "mark ii"
    - mk3
    - "mk 3"
    - "mk iii"
    - "mark 3"
    - "mark iii"
    - mk4
    - "mk 4"
    - "mk iv"
    - "mark 4"
    - "mark iv"
    - mk5
    - "mk 5"
    - "mk v"
    - "mark 5"
    - "mark v"
    - cosworth
    - "rs turbo"
    - xr3
    - "xr 3"
    - cabriolet
    - cabrio
    - orion
    # Body type — only 2-door coupé / saloon wanted. Estate / wagon reject.
    # "van" intentionally omitted (matches surnames "Van der …" too often);
    # the $2K USD floor and existing part-keywords catch parts-only "Mk1 van"
    # listings without that false-positive risk.
    - estate
    - wagon
    # Scale models
    - miniatura
    - minature
    - "1:43"
    - "1/43"
    - "1:18"
    - "1/18"
    # Parts (generic words)
    - pecas
    - pieces
    - parts
    - "motor de"
    - grelha
    - carrocaria
    - aileron
    - aleiron
    - "lote "
    - portas
    - vidro
    - "barra anti"
    - "vendo diverso"
      # 4-door body type — Mk1 search is 2-door only (per project requirement).
    # "4dr"/"4door" match as single tokens; "4 door"/"4-door"/"four-door"
    # match via the multi-word phrase path (hyphens are normalised to spaces).
    - 4dr
    - 4door
    - "4 dr"
    - "4 door"
    - "four door"
    - "4 portas"
    - "4 puertas"
    - "4 portes"
    # Parts (specific components seen in live DB). Single-word tokens are
    # word-bounded — be wary of any that overlap with legitimate body-type
    # descriptions (e.g. "doors" appears in "two doors" / "2 doors" / "four
    # doors", which describe the body, not parts). Prefer multi-word phrases.
    - gearbox
    - clocks
    - bumper
    - headlight
    - "tail light"
    - dashboard
    - grille
    - "fuel tank"
    - axle
    - "escort doors"
    - "mk1 doors"
    - "front door"
    - "rear door"
    - "escort seats"
    - "mk1 seats"
    - "escort wing"
    - "mk1 wing"
    - "escort wings"
    - "mk1 wings"
    - "escort bonnet"
    - "mk1 bonnet"
    - "escort hood"
    - "mk1 hood"
    - "escort dash"
    - "mk1 dash"
    - "para escort"
    - "para mk1"

# ─── Saved searches ──────────────────────────────────────────────────────────
# Each key under `searches:` corresponds to a row in the `searches` table
# (matched by slug). The slug is the dictionary key.
#
# Per-search keys:
#   label              — human display name, surfaced in UI + email subject
#   query              — search-engine query string each scraper substitutes
#                        into its URL (where it uses a `?q=` parameter)
#   required_keywords  — title-filter signals; a listing keeps if its title
#                        contains ANY one of these (case-insensitive substring)
#   sites              — which scrapers participate in this search; sites
#                        absent from the list are skipped on its scrape pass
#   filters            — per-search save-time filters. Empty / absent means
#                        no constraint. Falls back to top-level `filters:` for
#                        the cars hunt during Commit 1 (the top-level block
#                        moves into here in Commit 2).
#
# The top-level `filters:` block above is still the source of truth for the
# cars hunt's filters until the per-search filter migration lands. Don't
# duplicate values between the two until then or they'll drift.
searches:
  escort_mk1_lhd:
    label: "Ford Escort Mk1 LHD"
    query: "ford escort mk1"
    required_keywords:
      - escort
    sites:
      - autoscout24
      - carandclassic
      - classicdriver
      - ebay
      - marktplaats
      - facebook
    # AS24 is query-driven (make/model parsed from `query`: "ford escort mk1"
    # resolves to ford/escort). The Mk1 year window still needs pinning here
    # or the result pages fill with later Escort generations.
    site_overrides:
      autoscout24:
        year_from: 1968
        year_to: 1974   # 1975+ = California emissions bracket
    # filters: — read from top-level `filters:` above (Commit 1 back-compat)

  rs2000_mexico_seats:
    label: "RS2000 / Mexico Seats"
    # Kept deliberately broad: eBay's keyword search is AND-on-words, so a
    # narrow query like "ford escort rs2000 mexico seats" requires every one
    # of those words in the title. Most seat sellers omit "ford" and many
    # don't write "rs2000" or "mexico" — those listings were silently
    # dropped. "escort seats" reaches ~675 results in the eBay Seats
    # category; our title filter below (`required_keywords`) refines from
    # there to the rs2000/mexico variants we actually want.
    query: "escort seats"
    # OR semantics — any one keyword match passes the title filter.
    # "seat" (singular) is included so seat-cover / seat-adjacent parts also
    # surface for review — the user explicitly wants visibility to manually
    # reject (rather than silently dropping). The pattern miner will learn
    # the obvious rejects (seat belt, seat cover, etc.) over time.
    required_keywords:
      - seat
      - seats
      - rs2000
      - mexico
    # autoscout24 + classicdriver use URL paths (/lst/ford/escort), are
    # cars-only sites, and would surface no parts even if queried — skip.
    sites:
      - carandclassic
      - ebay
      - marktplaats
      - facebook
    # Per-site overrides — passed to the scraper as extra_params.
    # eBay needs category targeting because its keyword query is too narrow
    # without it (see comment on `query:` above). Marketplaces without a
    # mapping are skipped on this search; add DE/NL category IDs here when
    # those markets matter for seats.
    site_overrides:
      ebay:
        category_ids:
          EBAY_GB: "33701"   # Vehicle Parts > Car Parts > Interior > Seats
    filters:
      # Sized to the seats market: under $500 is almost always badges /
      # covers / parts-of-parts; over $7000 is a whole car (the cars hunt's
      # territory) leaking into the seats keyword search.
      min_price_usd: 500
      max_price_usd: 7000
      # Seats don't have meaningful years; skip the cars-style year window.
      year_from: null
      year_to: null
      # FB Marketplace injects locale-personalized listings based on the
      # request's egress IP (the home reverse-SOCKS tunnel exits on a US
      # residential IP). Restrict to Europe (EU + EEA + UK + Switzerland)
      # where seat parts are practical to receive. Listings whose
      # country_code is unknown are NOT blocked (the filter only excludes
      # when we positively know the country).
      allowed_country_codes:
        # EU 27
        - AT  # Austria
        - BE  # Belgium
        - BG  # Bulgaria
        - CY  # Cyprus
        - CZ  # Czechia
        - DE  # Germany
        - DK  # Denmark
        - EE  # Estonia
        - ES  # Spain
        - FI  # Finland
        - FR  # France
        - GR  # Greece
        - HR  # Croatia
        - HU  # Hungary
        - IE  # Ireland
        - IT  # Italy
        - LT  # Lithuania
        - LU  # Luxembourg
        - LV  # Latvia
        - MT  # Malta
        - NL  # Netherlands
        - PL  # Poland
        - PT  # Portugal
        - RO  # Romania
        - SE  # Sweden
        - SI  # Slovenia
        - SK  # Slovakia
        # EEA non-EU
        - IS  # Iceland
        - LI  # Liechtenstein
        - 'NO'  # Norway - quoted: YAML parses bare NO as the boolean false
        # Other European
        - CH  # Switzerland
        - GB  # United Kingdom
      # Seeded from the first scrape's manual rejections (all evidenced as
      # rejected, zero kept). Each phrase intentionally specific enough that
      # it doesn't collateral-damage seat-cover or full-interior-set listings.
      # The pattern miner (Tier 1) will suggest more over time.
      reject_title_keywords:
        # Seat belts — the loudest noise class on eBay (4 prior rejects)
        - "seat belt"
        - "seatbelt"
        # Hard mounting / structural parts (multiple prior rejects)
        - "crossmember"
        - "cross member"
        - "sitz querträger"       # German equivalent
        - "seat bracket"
        - "seat hinge"
        - "seat bolt"
        - "seat mount"
        # Decorative / trim parts that match "seat" but aren't the seat itself
        - "seat badge"
        - "tilt handle"
        # Non-seat interior parts
        - "centre console"
        - "center console"
        - "dash top"
        # Deliberately NOT in this list (would false-positive on legitimate
        # seats listings):
        #   "base foam"  — catches "Roll Top Seat Cover ... New Base Foams"
        #                  which is exactly the kind of seat-cover the user
        #                  wants to review
        #   "door card"  — full-interior-set listings often include door
        #                  cards alongside seats (legit lot purchases)
        #   "carpet" / "headlining" / "dashboard" — same risk as door card
        #   "seat runner" — sometimes appears in legit listings; punt to miner

  alfa_giulia_gt_junior:
    label: "Alfa Romeo Giulia GT Junior"
    # The 105-chassis coupe (1965-1974). Query is "alfa romeo gt" - not
    # "giulia" - because on eBay "alfa romeo giulia" returns almost all
    # modern (2015+) Giulia sedans, since that's the current dominant meaning
    # of the name. Classic 105 coupe titles overwhelmingly use "GT" (base,
    # Junior, Veloce, GTV, GTA) so "alfa romeo gt" hits them directly.
    # AS24 ignores this query anyway (it uses site_overrides.autoscout24.model="gt");
    # C&C is fine with the broader term; FB anchor search benefits too.
    query: "alfa romeo gt"
    # Broadened past just "Junior" to cover the whole 105 coupe family: base
    # GT, GTV, GTA, GTAm ("gtam" contains "gta"), Sprint GT, Bertone-badged
    # variants. Year window + AS24 model=gt slug + $35K USD cap keeps it
    # 105-era and affordable; if a hail-mary GTA/GTAm slips in under the
    # cap on eBay/FB, that's the whole point.
    required_keywords:
      - gt
      - gtv
      - gta
      - junior
      - sprint
      - bertone
    sites:
      - autoscout24
      - carandclassic
      - ebay
      - facebook
    site_overrides:
      # AS24 lists the 105 coupe as `alfa-romeo/gt` (not `giulia`, which
      # is the modern sedan). Force the model slug and pin the Junior
      # production years so the URL filter excludes the 2003-2010 GT
      # hatchback that shares the slug.
      autoscout24:
        model: gt
        year_from: 1965
        year_to: 1974   # 1975+ = California emissions bracket
      # Classic Alfa coupes are Italy-heavy; widen beyond the GB/DE/NL
      # default. Uses the per-search marketplaces override wired in
      # scrapers/ebay.py.
      ebay:
        marketplaces:
          - EBAY_GB
          - EBAY_DE
          - EBAY_NL
          - EBAY_IT
          - EBAY_ES
          - EBAY_FR
          - EBAY_AT
    filters:
      min_price_usd: 5000    # Below is parts / scale models
      max_price_usd: 35000   # Matches the Escort cap
      year_from: 1965        # 105 GT production start
      year_to: 1974          # 1975+ = California emissions bracket (was 1976)
      # Sprint Speciale (SS) - the Bertone one-off body - is not what the
      # user is hunting. "ss" is a single-token word-boundary match so it
      # won't false-hit "class", "boss", etc. Scalino (step-front early
      # Junior) was in this list initially but removed - once the classic
      # Alfa market realities became clear, seeing Scalinos is useful.
      reject_title_keywords:
        - "sprint speciale"
        - ss
        # Modern-GT / GTV (2003-2010 hatchback, 916-series GTV) exclusions.
        # FB Marketplace omits the year, so year=None listings slip past the
        # year window; these engine/spec tokens never appear on a 105-chassis
        # classic (all inline-4: 1300/1600/1750/2000), so they cleanly reject
        # the modern cars. Single tokens match at word boundaries.
        - jtd       # modern common-rail diesel
        - jtdm      # modern common-rail diesel
        - v6        # Busso V6 - never in the 105 coupe
        - busso     # the V6 engine by name
        - 24v       # modern multivalve
        - jts       # modern direct-injection petrol
        - subaru    # "Legacy 2.5GT" etc. matching the bare "gt" query
      # Same 32-country EU allowlist as the seats hunt (Europe-only).
      allowed_country_codes:
        - AT
        - BE
        - BG
        - CY
        - CZ
        - DE
        - DK
        - EE
        - ES
        - FI
        - FR
        - GR
        - HR
        - HU
        - IE
        - IT
        - LT
        - LU
        - LV
        - MT
        - NL
        - PL
        - PT
        - RO
        - SE
        - SI
        - SK
        - IS
        - LI
        - 'NO'
        - CH
        - GB

# ─── Review UI (--serve-web) ──────────────────────────────────────────────────
# Reasons that show up in the reject dropdown on the React review app.
# Reordering, adding, or removing entries here is reflected live without a
# code change (the API reads this list on each request).
review:
  reject_reasons:
    - "4 door"
    - "right hand drive"
    - "rolling shell"
    - "parts only"
    - "wrong variant"
    - "too far"
    - "too expensive"
    - "not interested"
    - "duplicate"
    - "no longer available"

# ─── Sanity-check (--validate) ────────────────────────────────────────────────
validate:
  # Phrases that indicate a listing page is sold/removed. Single words match at
  # word boundaries; multi-word phrases match as substrings. Bare "sold" is
  # deliberately excluded — it matches too many incidental occurrences ("sold out",
  # "items sold", FB login-wall promos, etc.).
  sold_signals:
    - "this listing is no longer available"
    - "this listing no longer exists"
    - "listing has been removed"
    - "this item has been sold"
    - "this car has been sold"
    - "now sold"
    - "sold subject to"
    - "verkauft am"
    - "reeds verkocht"
    - vendu
    - venduto
    - vendido
    - vendida
    - "a venda"
    - "em venda"
    - reservado
    - reservada
  # Two-strike rule: only mark a listing 'sold' after this many consecutive
  # validate runs see a sold signal. Resets when not seen.
  sold_strike_threshold: 2

# ─── Sites ────────────────────────────────────────────────────────────────────
sites:
  carandclassic:
    enabled: true
    make_id: 21           # Ford — confirmed via __NEXT_DATA__ quickFilters
    request_delay_min: 2.0
    request_delay_max: 5.0

  classicdriver:
    enabled: true
    sort: newest
    max_pages: 5

  ebay:
    enabled: true
    marketplaces:
      - EBAY_GB
      - EBAY_DE
      - EBAY_NL
    category_id: "9801"
    # app_id and cert_id — set via EBAY_APP_ID / EBAY_CERT_ID env vars
    # Register at https://developer.ebay.com (free)

  marktplaats:
    enabled: true
    category_id: 91       # Autos
    # client_id / client_secret — set via MARKTPLAATS_CLIENT_ID / MARKTPLAATS_CLIENT_SECRET
    # Falls back to HTML scraping if credentials are absent

  autoscout24:
    enabled: true
    countries: "D,NL,B,F,GB"
    max_pages: 10
    playwright_timeout: 45000

  facebook:
    enabled: true
    profile_dir: ".fb_profile"         # run `python run.py --fb-login` once to authenticate
    # FB Marketplace's implicit default without a radius param is ~805 km
    # (wider than we were pinning at 500). Setting this to null omits the
    # param and lets FB use its default, which gives better per-anchor
    # coverage.
    search_radius_km: null
    # 23-anchor coverage map. FB's marketplace search is location-radius-bound,
    # so a single search misses most of Europe. The previous 9-anchor set was
    # NW-Europe-heavy (London/Amsterdam/Brussels/Paris cluster) and left
    # Scandinavia, eastern Europe, most of Italy, and northern UK uncovered —
    # LHD Escorts in Portugal surfaced, but cars in Sweden or Poland never did.
    #
    # This set is verified gap-free against 48 probe cities (Inverness to
    # Crete, Galway to Chișinău) — every probe is within 500km of at least
    # one anchor. Overlap is intentional: FB's per-search result cap (~36)
    # means a single anchor can't return everything in its radius, so we
    # want multiple shots at each region. Cost: ~12min of pure search time
    # per FB scrape (23 × ~30s with throttling), expect total FB cron tick
    # to land around 40-60min.
    locations:
      # British Isles
      - {name: "Dublin",     lat: 53.3498, lng:  -6.2603}
      - {name: "Edinburgh",  lat: 55.9533, lng:  -3.1883}
      - {name: "London",     lat: 51.5074, lng:  -0.1278}
      # Iberia — high-density market for LHD Escorts. Porto removed: FB
      # doesn't recognise a "porto"/"oporto"/"wien"-style slug for it (falls
      # back to the egress-IP local marketplace), and Lisbon's ~805km radius
      # already reaches all of Portugal (verified: Coimbra/Santarem results).
      # `slug:` overrides the default name.lower() when FB needs a different
      # path segment; none of the current anchors need one.
      - {name: "Lisbon",     lat: 38.7169, lng:  -9.1395}
      - {name: "Madrid",     lat: 40.4168, lng:  -3.7038}
      # France / Benelux
      - {name: "Paris",      lat: 48.8566, lng:   2.3522}
      - {name: "Amsterdam",  lat: 52.3676, lng:   4.9041}
      - {name: "Lyon",       lat: 45.7640, lng:   4.8357}
      - {name: "Toulouse",   lat: 43.6047, lng:   1.4442}
      # Italy
      - {name: "Milan",      lat: 45.4642, lng:   9.1900}
      - {name: "Rome",       lat: 41.9028, lng:  12.4964}
      # DACH / central Europe
      - {name: "Munich",     lat: 48.1351, lng:  11.5820}
      - {name: "Berlin",     lat: 52.5200, lng:  13.4050}
      - {name: "Vienna",     lat: 48.2082, lng:  16.3738}
      # Scandinavia
      - {name: "Copenhagen", lat: 55.6761, lng:  12.5683}
      - {name: "Stockholm",  lat: 59.3293, lng:  18.0686}
      - {name: "Oslo",       lat: 59.9139, lng:  10.7522}
      # Eastern Europe
      - {name: "Warsaw",     lat: 52.2297, lng:  21.0122}
      - {name: "Budapest",   lat: 47.4979, lng:  19.0402}
      - {name: "Bucharest",  lat: 44.4268, lng:  26.1025}
      # Balkans / Greece
      - {name: "Sofia",      lat: 42.6977, lng:  23.3219}
      - {name: "Athens",     lat: 37.9838, lng:  23.7275}

# ─── Notifications ────────────────────────────────────────────────────────────
notification:
  type: email   # only "email" is currently supported

  email:
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_user: ""         # override via SMTP_USER env var
    smtp_pass: ""         # override via SMTP_PASS env var (use a Gmail App Password)
    from_addr: ""         # defaults to smtp_user if blank
    # Digest recipient list is populated from the DIGEST_RECIPIENTS env var
    # at runtime (comma-separated). Keep personal addresses out of source
    # control — the empty default here is intentional.
    to_addrs: []

# ─── Database ─────────────────────────────────────────────────────────────────
database:
  path: listings.db

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: INFO
  file: logs/escort_monitor.log
